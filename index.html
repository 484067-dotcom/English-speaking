<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI添削付き・英会話スピーキング練習アプリ (Gemini版)</title>
    <style>
        :root {
            --primary-color: #1a73e8; 
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --accent-color: #dd6b20;
        }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', メイリオ, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 24px;
            box-sizing: border-box;
            text-align: center;
        }
        h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 20px;
        }
        .config-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: left;
        }
        .config-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #4a5568;
            font-size: 0.95rem;
        }
        .config-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .config-group:last-child { margin-bottom: 0; }
        label { font-size: 0.9rem; color: #4a5568; }
        select, input {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #cbd5e0;
            font-size: 0.9rem;
        }
        .progress-text {
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 5px;
            text-align: right;
        }
        .video-container {
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #222;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); 
        }
        .question-box {
            min-height: 90px;
            background: #e8f0fe;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary-color);
            line-height: 1.5;
        }
        .category-tag {
            font-size: 0.75rem;
            background: var(--primary-color);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .speech-result-box {
            background: #fff;
            border: 2px dashed #cbd5e0;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 1rem;
            color: #4a5568;
            min-height: 60px;
            text-align: left;
            line-height: 1.4;
        }
        .timer {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 20px;
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn:hover { background-color: #1557b0; }
        .btn-secondary { background-color: #718096; }
        .btn-secondary:hover { background-color: #4a5568; }
        
        .ai-btn {
            background-color: #1a73e8;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 8px;
            cursor: pointer;
            display: inline-block;
            transition: background 0.2s;
        }
        .ai-btn:hover { background-color: #1557b0; }

        .feedback-box {
            display: none;
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>English Speaking & Gemini Review</h1>
    
    <div id="configArea" class="config-box">
        <div class="config-title">⚙️ Practice Settings</div>
        <div class="config-group">
            <label for="selectCategory">Category:</label>
            <select id="selectCategory">
                <option value="all">All Topics (ランダム)</option>
                <option value="Daily">Daily Life (日常・自己紹介)</option>
                <option value="School">School Life (学校生活・部活)</option>
                <option value="Travel">Travel & Culture (旅行・文化)</option>
                <option value="Opinion">Your Opinion (社会・意見)</option>
                <option value="Interview">Academic/Job (面接・将来)</option>
                <option value="Original">Original (オリジナル枠)</option>
            </select>
        </div>
        <div class="config-group">
            <label for="inputCount">Questions:</label>
            <input type="number" id="inputCount" value="3" min="1" max="10" style="width: 50px;"> 問
        </div>
        <div class="config-group">
            <label for="inputTime">Time per question:</label>
            <input type="number" id="inputTime" value="45" min="10" max="180" style="width: 50px;"> 秒
        </div>
    </div>

    <div id="progressText" class="progress-text" style="display:none;">0 / 0</div>

    <div class="video-container">
        <video id="webcamera" autoplay playsinline muted></video>
    </div>

    <div id="questionBox" class="question-box">
        <div id="questionText">Ready? Click "Start" to practice!</div>
    </div>

    <div id="speechArea" style="display:none;">
        <div style="font-size:0.8rem; color:#718096; text-align:left; margin-bottom:3px;">🎙️ あなたが喋った英語（すべて記録されます）:</div>
        <div id="speechResult" class="speech-result-box">（ここに喋った英語が表示されます）</div>
    </div>
    
    <div id="timer" class="timer">00:45</div>

    <button id="actionBtn" class="btn" onclick="startInterview()">Start Practice</button>
    <button id="stopBtn" class="btn btn-secondary" onclick="stopInterview(true)" style="display:none;">Finish & See Feedback</button>

    <div id="feedbackArea" class="feedback-box"></div>
</div>

<script>
    const questionsDatabase = [
        { cat: "Daily", q: "Could you please tell me about your hometown?", advice: "場所の説明だけでなく、何が有名か、何をするのがおすすめかを付け加えましょう。" },
        { cat: "Daily", q: "What do you like to do in your free time?", advice: "趣味を答えた後、「なぜそれが好きなのか」「どれくらいの頻度でやるのか」まで広げましょう。" },
        { cat: "School", q: "What is your favorite school subject, and why?", advice: "「〇〇が好き」の後に、具体的な理由（Because it's interesting...など）を繋げましょう。" },
        { cat: "School", q: "Tell me about your school club or any school events you like.", advice: "部活動や思い出です。過去形（I enjoyed... / We practiced...）を使って話しましょう。" },
        { cat: "Travel", q: "If you could visit any country, where would you like to go?", advice: "行きたい国を挙げ、そこで「何を見たいか」「何を体験したいか」を語りましょう。" },
        { cat: "Opinion", q: "Do you think students should wear school uniforms?", advice: "まず自分の立場（I think...）を明確にし、Becauseで理由を2つ述べられるとベストです。" },
        { cat: "Interview", q: "Why are you interested in studying at this school?", advice: "志望動機です。学校の強みと自分の将来の夢をリンクさせて熱意を伝えましょう。" },
        { cat: "Original", q: "Welcome to our class! Please introduce yourself briefly.", advice: "自己紹介です。名前、好きなこと、目標などをハキハキ話しましょう。" }
    ];

    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let timerInterval;
    let timeLeft = 45;
    let maxTimePerQuestion = 45;
    let historyAdvices = [];
    
    let finalTranscript = ''; 
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    function initRecognition() {
        if (!SpeechRecognition) return;
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = true;
        recognition.continuous = true;

        recognition.onresult = (event) => {
            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript + ' ';
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }
            const fullText = finalTranscript + interimTranscript;
            document.getElementById('speechResult').innerText = fullText;
            if(historyAdvices[currentQuestionIndex]) {
                historyAdvices[currentQuestionIndex].userAnswer = fullText;
            }
        };
    }

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            document.getElementById('webcamera').srcObject = stream;
        } catch (err) {
            alert("Camera error. Please allow camera access.");
        }
        initRecognition();
    }

    function startInterview() {
        const category = document.getElementById('selectCategory').value;
        const totalCountSetting = parseInt(document.getElementById('inputCount').value);
        maxTimePerQuestion = parseInt(document.getElementById('inputTime').value);

        let filtered = questionsDatabase;
        if (category !== 'all') {
            filtered = questionsDatabase.filter(q => q.cat === category);
        }

        filtered.sort(() => Math.random() - 0.5);
        currentQuestions = filtered.slice(0, Math.min(totalCountSetting, filtered.length));

        currentQuestionIndex = 0;
        historyAdvices = [];
        document.getElementById('configArea').style.display = 'none';
        document.getElementById('feedbackArea').style.display = 'none';
        document.getElementById('progressText').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'block';
        document.getElementById('speechArea').style.display = 'block';
        
        document.getElementById('actionBtn').onclick = nextQuestion;
        
        showQuestion();
    }

    function showQuestion() {
        if (currentQuestionIndex >= currentQuestions.length) {
            stopInterview(false);
            return;
        }

        finalTranscript = ''; 
        const currentData = currentQuestions[currentQuestionIndex];
        historyAdvices.push({ q: currentData.q, advice: currentData.advice, userAnswer: '' });

        document.getElementById('progressText').innerText = `Q: ${currentQuestionIndex + 1} / ${currentQuestions.length}`;
        document.getElementById('speechResult').innerText = '（Listening... 英語で喋ってください）';

        document.getElementById('questionBox').innerHTML = `
            <span class="category-tag">${currentData.cat}</span>
            <div id="questionText" style="color: #1a365d;">${currentData.q}</div>
        `;

        if (currentQuestionIndex === currentQuestions.length - 1) {
            document.getElementById('actionBtn').innerText = 'Finish (See Results)';
        } else {
            document.getElementById('actionBtn').innerText = 'Next Question';
        }

        // 音声認識を新しくクリーンに起動する（バグ対策）
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
            setTimeout(() => {
                try { recognition.start(); } catch(e) {}
            }, 200);
        }

        clearInterval(timerInterval);
        timeLeft = maxTimePerQuestion;
        updateTimerDisplay();

        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('timer').innerText = "Time's up!";
                if (recognition) { try { recognition.stop(); } catch(e) {} }
            }
        }, 1000);
    }

    function nextQuestion() {
        if (recognition) { try { recognition.stop(); } catch(e) {} }
        currentQuestionIndex++;
        // わずかにディレイをかけて次へ（マイクの競合バグを防ぐ）
        setTimeout(showQuestion, 100);
    }

    function updateTimerDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        document.getElementById('timer').innerText = 
            `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    // クリップボードへコピーしてGeminiを開く新しい関数
    function copyAndOpenGemini(btn, base64Text) {
        const text = decodeURIComponent(atob(base64Text));
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "✅ コピー完了！Geminiを開きます...";
            btn.style.backgroundColor = "#38a169";
            
            setTimeout(() => {
                window.open("https://gemini.google.com/app", "_blank");
                btn.innerText = originalText;
                btn.style.backgroundColor = "#1a73e8";
            }, 800);
        }).catch(err => {
            alert("コピーに失敗しました。お手数ですが手動でコピーしてください。");
        });
    }

    function stopInterview(isInterrupted) {
        clearInterval(timerInterval);
        if (recognition) { try { recognition.stop(); } catch(e) {} }
        
        document.getElementById('configArea').style.display = 'block';
        document.getElementById('progressText').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('speechArea').style.display = 'none';
        
        document.getElementById('questionBox').innerHTML = '<div id="questionText">Great job! Practice completed.</div>';
        document.getElementById('timer').innerText = '00:00';
        
        document.getElementById('actionBtn').innerText = 'Practice Again';
        document.getElementById('actionBtn').onclick = startInterview;

        const feedbackArea = document.getElementById('feedbackArea');
        feedbackArea.style.display = 'block';

        let titleText = isInterrupted ? "Review (途中終了)" : "🎉 Review & Gemini添削";
        
        let html = `<h3 style="margin-top:0; color:var(--primary-color);">${titleText}</h3>`;
        html += `<p style="font-size:0.9rem; color:#4a5568;">青いボタンを押すと、自動的に添削用の文章がコピーされてGeminiが開きます。開いたGeminiのチャット欄に「貼り付け(Ctrl+V)」をして送信してください！</p>`;

        historyAdvices.forEach((item, index) => {
            const promptText = `I am practicing English speaking. For the question "${item.q}", I answered: "${item.userAnswer || ''}". Please correct any grammatical mistakes and provide 3 more natural alternative expressions suitable for a high school student in Japanese explanation.`;
            // 日本語命令もミックスした文章にする
            const fullPrompt = `私は英語のスピーキング練習をしています。質問「${item.q}」に対して、私が答えた次の英語「${item.userAnswer || '(未入力)'}」の文法ミスを修正し、高校生向けにより自然でカッコいい表現にした選択肢を3つ日本語の解説付きで教えてください。`;
            const base64Prompt = btoa(unescape(encodeURIComponent(fullPrompt)));

            html += `
                <div style="margin-bottom: 20px; border-bottom: 1px dashed #cbd5e0; padding-bottom: 15px;">
                    <strong style="color:#1a73e8;">Q${index + 1}: ${item.q}</strong><br>
                    <div style="background:#f7fafc; padding:8px; border-radius:4px; margin:5px 0; font-size:0.9rem; border-left:3px solid #cbd5e0; word-break: break-word;">
                        🗣️ <b>あなたの回答:</b> ${item.userAnswer || '<span style="color:#a0aec0;">(聞き取れませんでした)</span>'}
                    </div>
                    ${item.userAnswer ? `<button onclick="copyAndOpenGemini(this, '${base64Prompt}')" class="ai-btn">✨ 文章をコピーしてGeminiで添削する</button>` : ''}
                </div>
            `;
        });
        
        feedbackArea.innerHTML = html;
    }

    window.onload = initCamera;
</script>

</body>
</html>
